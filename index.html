<!DOCTYPE html>
<html lang="lv">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Auga pase – Pļavas dedestiņa</title>

  <style>
    /* ===== Krāsu mainīgie ===== */
    :root{
      --bg:#FFF5CC;        /* dzeltenīgs fons visai lapai */
      --card:#FFFFFF;      /* baltas kartītes/konteineri */
      --text:#1c1e21;
      --muted:#65676b;
      --brand:#046f1b;     /* iedvesmots tonis */
      --border:#e4e6eb;
      --shadow: 0 10px 25px rgba(0,0,0,.08);
    }

    /* Tumšais režīms: šis strādā, ja data-theme tiek uzlikts UZ <html> elementa */
    html[data-theme="dark"]{
      --bg:#3b2f00;        /* tumšā režīma dzeltenbrūns fons */
      --card:#242526;
      --text:#e4e6eb;
      --muted:#b0b3b8;
      --brand:#0bd452;
      --border:#3a3b3c;
      --shadow: 0 10px 25px rgba(0,0,0,.45);
    }

    /* ===== Bāze ===== */
    *{box-sizing:border-box}
    html,body{height:100%}
    body{
      margin:0; background:var(--bg); color:var(--text);
      font-family:system-ui,-apple-system,"Segoe UI",Roboto,"Noto Sans",Arial,sans-serif;
      line-height:1.5;
    }

    /* ===== Augšējā josla ===== */
    .topbar{
      position:sticky; top:0; z-index:30;
      display:flex; align-items:center; justify-content:space-between;
      background:var(--bg); border-bottom:1px solid var(--border);
      padding:.6rem .9rem;
    }
    .brand{display:flex; align-items:center; gap:.5rem; color:var(--brand); font-weight:800}
    .brand__emoji{font-size:1.2rem}
    .icon-btn{
      background:transparent; border:1px solid var(--border); color:var(--text);
      padding:.35rem .6rem; border-radius:.5rem; cursor:pointer;
    }

    /* ===== Titulbilde + profils ===== */
    .cover-wrap{ position:relative; }
    .cover{
      width:100%;
      /* Desktopā seklāka, telefonā augstāka */
      aspect-ratio: 26/6;
      object-fit:cover; display:block; background:#dfe3ee;
    }

    /* Baltais profila konteiners, kas pārklājas ar titulbildes apakšu */
    .profile-bar{
      background: var(--card);
      position:relative;
      display:flex; align-items:center; gap:1rem;
      /* ŠEIT galvenās izmaiņas: profila bloka platums plūst līdzi ekrānam */
      width: clamp(280px, 92vw, 920px);
      margin: -48px auto 0;           /* pārklāšanās ar cover apakšu */
      padding: .8rem 1rem;
      border:1px solid var(--border);
      border-radius:.9rem;
      box-shadow: var(--shadow);
    }

    .avatar{
      /* Avatāram arī plūstošs izmērs, bet ar minimumu */
      width: clamp(56px, 8vw, 96px);
      height: clamp(56px, 8vw, 96px);
      border-radius:50%; object-fit:cover;
      border:3px solid var(--card); box-shadow:var(--shadow); background:#cbd5e1;
      flex: 0 0 auto;
    }

    .profile-info{ display:flex; flex-direction:column; min-width: 0; }
    /* Nosaukums plūstoši samazinās */
    .plant-name{
      margin:.1rem 0 0 0;
      font-size: clamp(1.05rem, 3.2vw, 1.7rem);
      line-height: 1.2;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .muted{ color:var(--muted); }

    /* ===== Saturs ===== */
    .container{
      width:min(1100px, 100%); margin: .8rem auto 2rem; padding: 0 1rem;
    }

    /* Konteineri (kartītes) – balti */
    .cards{
      display:grid; gap:1rem;
      grid-template-columns: 1fr;
    }
    @media (min-width: 600px){
      .cards{ grid-template-columns: repeat(2, 1fr); }
    }
    @media (min-width: 960px){
      .cards{ grid-template-columns: repeat(3, 1fr); }
    }

    .card{
      background:var(--card);
      border:1px solid var(--border);
      border-radius:.8rem;
      box-shadow:var(--shadow);
      overflow:hidden;
      display:flex; flex-direction:column;
      transition: transform 0.3s;
    }
    .card:hover {
      transform: scale(1.03);
    }
    .card__img{
      width:100%; aspect-ratio: 4/3; object-fit:cover; background:#e5e7eb;
      display:block;
    }
    .card__body{
      padding:.75rem .9rem;
    }
    .card__title{ margin:0 0 .25rem; font-size:1rem; }
    .card__text{ margin:0; color:var(--muted); }

    /* ===== Adaptīvie pielāgojumi ===== */
    @media (max-width: 900px){
      .profile-bar{
        gap:.8rem;
        padding:.7rem .9rem;
        margin-top: -42px;             /* mazliet mazāk pārklāšanās */
        width: clamp(260px, 94vw, 840px);
      }
      .cover{ aspect-ratio: 16/7; }    /* telefonā cover nedaudz augstāks */
    }

    @media (max-width: 600px){
      .profile-bar{
        gap:.7rem;
        padding:.6rem .8rem;
        margin-top: -36px;
        width: clamp(240px, 96vw, 720px);
      }
      .plant-name{ font-size: clamp(1rem, 4.2vw, 1.4rem); }
    }

    /* ===== Kājene ===== */
    .footer{ text-align:center; color:var(--muted); padding: 2rem 1rem; }
    /* ===== MODAL LOGS ===== */

.modal-backdrop{
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.45);
  backdrop-filter: blur(3px);
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 1rem;
  z-index: 200;
  opacity: 0;
  pointer-events: none;
  transition: opacity .25s ease;
}

.modal-backdrop.active{
  opacity: 1;
  pointer-events: auto;
}

.modal-window{
  background: var(--card);
  border-radius: 1rem;
  box-shadow: var(--shadow);
  max-width: 520px;
  width: 100%;
  max-height: 85vh;
  overflow-y: auto;
  padding: 1.2rem 1.4rem;
  position: relative;
  border: 1px solid var(--border);
  animation: modalShow .3s ease;
}

@keyframes modalShow {
  from { transform: translateY(20px); opacity: 0; }
  to { transform: translateY(0); opacity: 1; }
}

.modal-close{
  position: absolute;
  top: .6rem;
  right: .6rem;
  background: transparent;
  border: none;
  font-size: 1.4rem;
  color: var(--text);
  cursor: pointer;
}
  </style>
</head>
<body>
  <!-- Virsraksta josla -->
  <header class="topbar" aria-label="Galvenā navigācija">
    <div class="brand">
      <span class="brand__emoji">🌿</span>
      <span class="brand__text">Auga pase</span>
    </div>
    <button id="themeToggle" class="icon-btn" aria-label="Tumšais/gaišais režīms" type="button">🌓</button>
  </header>

  <!-- Titulbilde + profila bloks -->
  <section class="cover-wrap">
    <!-- Titulbilde (nomainiet uz savu failu) -->
    <img class="cover" id="coverImage"
         src="dedestina.jpg"
         alt="Titulbilde">

    <!-- Pārklājošs profils (balts konteiners, elastīgs) -->
    <div class="profile-bar">
      <img class="avatar" id="avatarImage"
           src="2dedestina.jpg"
           alt="Profila ikona">
      <div class="profile-info">
        <h1 id="plantName" class="plant-name">Pļavas dedestiņa <span class="muted">(Lathyrus pratensis)</span></h1>
        <p class="muted">Tauriņziežu dzimta (Fabaceae)</p>
      </div>
    </div>
  </section>

  <!-- Mazie konteineri (kartītes) -->
  <main class="container">
    <section class="cards" id="cards">
      <!-- Kartītes ielādēs JS -->
    </section>
  </main>

  <footer class="footer">
    <div id="modal" class="modal-backdrop">
      <div class="modal-window">
        <button class="modal-close" id="modalClose">✖</button>
        <h2 id="modalTitle"></h2>
        <p id="modalText"></p>
        <img id="modalImg" style="width:100%; border-radius:.6rem; margin-top:.8rem;">
      </div>
    </div>
    <small>© 2026 Auga pase – mācību projekts. Izstrādātājas: Katrīna Primaka un Nellija Niparte</small>
  </footer>

  <script>
    (function(){
      /* ========== Tumšā/gaišā režīma loģika ========== */
      const LS_THEME = 'pb_theme';
      const root = document.documentElement; // <html>
      const themeToggle = document.getElementById('themeToggle');

      // Atjauno tēmu no localStorage (ja ir)
      const saved = localStorage.getItem(LS_THEME);
      if (saved === 'dark' || saved === 'light') {
        root.setAttribute('data-theme', saved);
      }

      // Pārslēdz tēmu ar pogu
      themeToggle.addEventListener('click', () => {
        const isDark = root.getAttribute('data-theme') === 'dark';
        const next = isDark ? 'light' : 'dark';
        root.setAttribute('data-theme', next);
        localStorage.setItem(LS_THEME, next);
      });

      /* ========== Kartīšu ielāde ========== */
      const cardsWrap = document.getElementById('cards');

      const cards = [
        {
          title: 'Iepazīsties ar mani!',
          text: 'Mans izskats: daudzgadīgs augs, 30-120 cm garš tauriņziežu lakstaugs ar ložņājošu sakneni, kas veido zarainus, kāpelējošus, neizteikti četršķautņainus stublājus.',
          img: '3dedestina.jpg' 
        },
        {
          title: 'Mani sauc Pļavas dedestiņa!',
          text: 'Latviski: Pļavas dedestiņas. Latīniski: Lathyrus pratensis. Mana ģimene (dzimta): Taureņzieži dzimta. Dzimtas (ģimenes) raksturojums: Taureņzieži pieder pākšaugu rindai, divdīgļlapju klasei. Dzimtas vārds ir veidots pēc auga zieda izskata.',
          img: '6d.jpg'
        },
        {
          title: 'Tu mani atpazīsi pēc šādas zieda formulas:',
          text: 'K(5)   V1+2(2)   P(10)  A1',
          img: 'puke.jpg'
        },
        {
          title: 'Kā veidojas mani pēcnācēji?',
          text: 'Ziedēšana - augs zied - apputeksnēšanās - sēklu veidošanās - jauns augs. Auglis ir iegarena, tumši brūna, 2,5—3,5 cm gara pāksts. Sēklas — dzeltenīgas līdz zaļganpelēkas ar vairāk vai mazāk izteiktu tumši violetu marmorējumu. Lielākajai daļai ziedu pākstis neattīstās, un arī daudzas sēklas iznīcina kukaiņi.', 
          img: 'dedestina5.jpg'
        },
         {
          title: 'Tu mani vari sastapt.',
          text: 'Kur gan var sastapt pļavas destiņas? Mani var sastapt Latvijas pļavās, mežmalās, upju, ezeru krastos un krūmājos. Esmu liela saulmīle. Vislabāk augu ar barības vielām bagātās, mitrās, bet neapplūstošās smilšmāla augsnēs. Esmu izturīga pret pazeminātu pH līmeni.',
          img: 'plava.jpg'
        },
        {
          title: 'Tu mani atpazīsi pēc šādām ārējām pazīmēm.',
          text: 'Stumbrs: 30 - 100 cm garš, kāpelējošs, zarains, neizteikti četršķautņains un kails. Lapu sakārtojums pie stumbra: lapa beidzas ar garu, žuburainu vītni. Lapas dzīslojums: plūksnains, starains, lokveida. Saknes veids: mietveida sakne. Tieva, ar daudziem dzinumiem. Citas būtiskas pazīmes: labs nektārs apputeksnētājiem. Norāda uz mitru auglīgu augsni.',
          img: 'OIP.webp'
        },
        {
          title: 'Tu mani atpazīsi pēc lapas ārējām pazīmēm.',
          text: 'Pamīšus sakārtotas pāra plūksnaini saliktas lapas ar vienu lapiņu pāri un garu, sazarotu vītni lapas galā. Manas lapiņas lancetiskas (garums 2—4 cm, platums 0,3—0,8 cm), virspusē tumši zaļas, apakšpusē zilganas. Pielapes gandrīz tikpat lielas kā lapiņas, bultveida, ar gludu malu.',
          img: 'lapinas.webp'
        },
        {
           title: 'Mani draugi',
          text: 'Mani draugi ir pļavas āboliņš, margrietiņa, rudzupuķes, pīpeles, baldriāns un apputeksnētāji (tauriņi un bites).',
          img: 'margrietinas.jpg'
        },
        {
          title: 'Kapēc es esmu noderīga?',
          text: 'Es esmu noderīga, jo es esmu vērtīgs barības augs govīm, aitām un zirgiem. Esmu ārstniecības augs. Lakstus lieto kā maigu atklepošanas līdzekli, slimojot ar bronhītu, plaušu tuberkulozi un citām elpošanas orgānu slimībām. Mani ievāc visu auga ziedēšanas periodu, līdz parādās pirmie augļi. Lapās, stublājos un ziedos nav konstatētas indīgas vielas, taču tādas var būt augļos un sēklās.',
          img: 'cow.jpg'
        },
      ];

      function renderCards(){
        cardsWrap.replaceChildren(
          ...cards.map(c => cardEl(c))
        );
      }

      function cardEl(c){
  const card = document.createElement('article');
  card.className = 'card';
  card.tabIndex = 0; 
  card.style.cursor = 'pointer';

  card.addEventListener('click', () => openModal(c));

  const img = document.createElement('img');
  img.className = 'card__img';
  img.alt = c.title;
  img.src = c.img;

  const body = document.createElement('div');
  body.className = 'card__body';

  const h3 = document.createElement('h3');
  h3.className = 'card__title';
  h3.textContent = c.title;

  const p = document.createElement('p');
  p.className = 'card__text';
  p.textContent = c.text;

  body.append(h3, p);
  card.append(img, body);
  return card;
}

      renderCards();
/* ===== Modal logika ===== */
const modal = document.getElementById('modal');
const modalTitle = document.getElementById('modalTitle');
const modalText = document.getElementById('modalText');
const modalImg = document.getElementById('modalImg');
const modalClose = document.getElementById('modalClose');

function openModal(c){
  modalTitle.textContent = c.title;
  modalText.textContent = c.text;
  modalImg.src = c.img;

  modal.classList.add('active');
}

function closeModal(){
  modal.classList.remove('active');
}

modalClose.addEventListener('click', closeModal);

// Aizver, klikšķinot ārpus lodziņa
modal.addEventListener('click', e => {
  if (e.target === modal) closeModal();
});

// Aizver ar ESC
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeModal();
});
    })();
  </script>
</body>
</html>
